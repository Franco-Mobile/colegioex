services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: python-app:iv1
    container_name: exitusWeb
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./staticfiles:/app/staticfiles
    working_dir: /app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8005:8000"

  db:
    image: postgres:15
    restart: always
    container_name: exitusDb
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pdb_exitus:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pdb_exitus:
    driver: local
