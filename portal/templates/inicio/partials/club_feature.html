{% load static %}
<article class="club-feature club-feature--{{ club.slug }} club-feature--{{ club.color }}{% if club.reverse %} club-feature--reverse{% endif %} reveal" data-club="{{ club.name }}">
    <div class="club-copy">
        <span class="club-number">{{ club.number }}</span>
        <span class="club-line" aria-hidden="true"></span>
        <h3>{{ club.name }}</h3>
        <p>{{ club.summary }}</p>
        <button class="club-link js-club-detail" type="button">Ver más <span aria-hidden="true">→</span></button>
    </div>
    <div class="club-visual club-visual--{{ club.color }}">
        <img src="{% static club.image %}" alt="{{ club.alt }}" loading="lazy" decoding="async">
        <button class="visual-plus js-club-detail" type="button" aria-label="Conocer el club de {{ club.name|lower }}">+</button>
    </div>
</article>
