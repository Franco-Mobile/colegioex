<section class="all-clubs" id="vida-escolar" aria-labelledby="all-clubs-title">
    <div class="all-clubs__wave" aria-hidden="true"></div>
    <div class="all-clubs__inner">
        <h2 class="sr-only" id="all-clubs-title">Todos nuestros clubes</h2>
        <div class="club-icon-grid">
            <button class="mini-club js-mini-club" type="button" data-club="Fútbol"><span class="mini-club__icon">⚽</span><span>Fútbol</span><i class="dot dot--amber"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Básquet"><span class="mini-club__icon">🏀</span><span>Básquet</span><i class="dot dot--navy"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Vóley"><span class="mini-club__icon">🏐</span><span>Vóley</span><i class="dot dot--gray"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Gimnasia"><span class="mini-club__icon">🤸</span><span>Gimnasia</span><i class="dot dot--amber"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Teatro"><span class="mini-club__icon">🎭</span><span>Teatro</span><i class="dot dot--aqua"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Cine"><span class="mini-club__icon">🎬</span><span>Cine</span><i class="dot dot--navy"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Audiovisual"><span class="mini-club__icon">🎥</span><span>Audiovisual</span><i class="dot dot--aqua"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Música"><span class="mini-club__icon">🎵</span><span>Música</span><i class="dot dot--amber"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Robótica"><span class="mini-club__icon">🤖</span><span>Robótica</span><i class="dot dot--aqua"></i></button>
            <button class="mini-club js-mini-club" type="button" data-club="Arte"><span class="mini-club__icon">🎨</span><span>Arte</span><i class="dot dot--navy"></i></button>
        </div>

        <p class="all-clubs__message">Y muchos <strong>clubes más</strong> te esperan...</p>
        <button class="outline-button js-open-clubs" type="button">Conocer todos los clubes <span aria-hidden="true">→</span></button>
    </div>
</section>
